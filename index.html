<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>捲繞規格計算系統 - 正確版</title>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.2rem; margin: 0 0 15px 0; color: #0f172a; border-left: 5px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
        .input-group label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        .mode-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; background: white; font-weight: bold; }
        .mode-btn.active { background: #334155; color: white; border-color: #334155; }
        .res-display { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 12px; margin-top: 10px; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .res-num { font-size: 1.35rem; font-weight: 800; color: #0284c7; font-family: 'Courier New', monospace; }
        .btn-calc { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🌀 捲繞外徑計算</h2>
        <div class="mode-box">
            <div id="ob1" class="mode-btn active" onclick="setOMode(7060, 17.6, 'ob1')">7060</div>
            <div id="ob2" class="mode-btn" onclick="setOMode(2060, 9.6, 'ob2')">2060</div>
        </div>
        <div class="grid">
            <div class="input-group"><label>輸入米數 (L)</label><input type="number" id="ol" placeholder="M"></div>
            <div class="input-group"><label>輸入厚度 (T)</label><input type="number" id="ot" placeholder="mm"></div>
        </div>
        <button class="btn-calc" style="background:#6366f1;" onclick="calcOD()">執行計算</button>
        <div class="res-display" id="od_res" style="display:none;">
            <div class="res-row"><span class="res-label">計算總外徑</span><span id="res_od_val" class="res-num">---</span><span class="res-label">cm</span></div>
            <div class="res-row"><span class="res-label">單邊半徑</span><span id="res_r_val" class="res-num">---</span><span class="res-label">cm</span></div>
        </div>
    </div>

    <div class="card">
        <h2>📏 雙向回推計算</h2>
        <div class="mode-box">
            <div id="rb1" class="mode-btn active" onclick="setRMode(7060, 17.6, 'rb1')">7060</div>
            <div id="rb2" class="mode-btn" onclick="setRMode(2060, 9.6, 'rb2')">2060</div>
        </div>
        
        <label style="font-size: 0.75rem; color: #64748b; font-weight: bold;">1. 量測成品尺寸 (cm)</label>
        <div class="grid" style="margin-top:5px;">
            <div class="input-group"><label>總外徑 (cm)</label><input type="number" id="rev_od" placeholder="cm" oninput="document.getElementById('rev_side').value=''"></div>
            <div class="input-group"><label>單邊半徑 (cm)</label><input type="number" id="rev_side" placeholder="cm" oninput="document.getElementById('rev_od').value=''"></div>
        </div>

        <div style="border-top: 1px dashed #ddd; margin: 15px 0;"></div>

        <label style="font-size: 0.75rem; color: #64748b; font-weight: bold;">2. 輸入已知條件 (二選一)</label>
        <div class="grid" style="margin-top:5px;">
            <div class="input-group"><label>已知米數 (L)</label><input type="number" id="rev_l" placeholder="M" oninput="document.getElementById('rev_t').value=''"></div>
            <div class="input-group"><label>已知厚度 (T)</label><input type="number" id="rev_t" placeholder="mm" oninput="document.getElementById('rev_l').value=''"></div>
        </div>

        <button class="btn-calc" onclick="calcDual()">執行回推</button>
        
        <div class="res-display" id="dual_res" style="display:none; background:#ecfdf5; border-color:#a7f3d0;">
            <div class="res-row" id="row_t"><span class="res-label" style="color:#065f46;">計算厚度 (T)</span><span id="res_t_val" class="res-num" style="color:#059669;">---</span><span style="color:#059669; font-weight:bold;">mm</span></div>
            <div class="res-row" id="row_l"><span class="res-label" style="color:#065f46;">計算米數 (L)</span><span id="res_l_val" class="res-num" style="color:#059669;">---</span><span style="color:#059669; font-weight:bold;">M</span></div>
        </div>
    </div>
</div>

<script>
    let cO = 7060, mO = 17.6;
    let cR = 7060, mR = 17.6;

    function setOMode(c, m, id) {
        cO = c; mO = m;
        document.querySelectorAll('[id^="ob"]').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setRMode(c, m, id) {
        cR = c; mR = m;
        document.querySelectorAll('[id^="rb"]').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 🌀 修正後的外徑計算
    function calcOD() {
        const l = parseFloat(document.getElementById('ol').value);
        const t = parseFloat(document.getElementById('ot').value);
        if(!l || !t) return alert("請輸入米數與厚度");
        
        // 公式核心：od_mm 直接就是外徑毫米，不應再進行多餘的係數縮放
        const od_mm = Math.sqrt((l * t * 318.31) + cO);
        
        // 顯示結果：
        // 總外徑 = od_mm 除以 10 變成 cm
        // 單邊半徑 = 總外徑除以 2
        document.getElementById('res_od_val').innerText = (od_mm / 10).toFixed(2);
        document.getElementById('res_r_val').innerText = (od_mm / 20).toFixed(2);
        document.getElementById('od_res').style.display = 'block';
    }

    // 📏 修正後的雙向回推
    function calcDual() {
        let od_cm = parseFloat(document.getElementById('rev_od').value);
        const side_cm = parseFloat(document.getElementById('rev_side').value);
        const known_l = parseFloat(document.getElementById('rev_l').value);
        const known_t = parseFloat(document.getElementById('rev_t').value);

        if (!od_cm && side_cm) od_cm = side_cm * 2;
        if (!od_cm) return alert("請輸入量測尺寸");
        
        const od_mm = od_cm * 10;

        document.getElementById('row_t').style.display = 'none';
        document.getElementById('row_l').style.display = 'none';

        // 直接用外徑平方計算，不除以任何縮放係數
        if (known_l) {
            const t = (Math.pow(od_mm, 2) - cR) / (known_l * 318.31);
            document.getElementById('res_t_val').innerText = t.toFixed(5);
            document.getElementById('row_t').style.display = 'flex';
        } else if (known_t) {
            const l = (Math.pow(od_mm, 2) - cR) / (known_t * 318.31);
            document.getElementById('res_l_val').innerText = Math.round(l);
            document.getElementById('row_l').style.display = 'flex';
        }

        document.getElementById('dual_res').style.display = 'block';
    }
</script>
</body>
</html>
