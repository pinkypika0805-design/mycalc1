<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>捲繞規格計算系統</title>
    <style>
        :root { --primary: #2563eb; --secondary: #10b981; --bg: #f8fafc; --card: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1e293b; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.2rem; margin: 0 0 15px 0; color: #0f172a; border-left: 5px solid var(--primary); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--primary); }
        .mode-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: 0.85rem; background: white; font-weight: bold; }
        .mode-btn.active { background: #334155; color: white; border-color: #334155; }
        .res-display { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 12px; margin-top: 10px; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .res-num { font-size: 1.35rem; font-weight: 800; color: #0284c7; font-family: 'Courier New', monospace; }
        .btn-calc { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; margin-top: 10px; cursor: pointer; }
        .hint { font-size: 0.7rem; color: #94a3b8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📏 厚度回推計算</h2>
        <div class="input-group"><label>選擇捲心規格 (C)</label></div>
        <div class="mode-box">
            <div id="rb1" class="mode-btn active" onclick="setRMode(7060, 17.6, 'rb1')">7060</div>
            <div id="rb2" class="mode-btn" onclick="setRMode(2060, 9.6, 'rb2')">2060</div>
        </div>
        <div class="input-group"><label>實際米數 (L)</label><input type="number" id="rev_l" placeholder="輸入米數"></div>
        <div class="grid" style="margin-top:10px;">
            <div class="input-group"><label>量測總外徑 (OD)</label><input type="number" id="rev_od" placeholder="mm" oninput="clearOthers('od')"></div>
            <div class="input-group"><label>或 量測單邊半徑</label><input type="number" id="rev_side" placeholder="mm" oninput="clearOthers('side')"></div>
        </div>
        <div class="hint">* 填入總外徑或單邊半徑其中一個即可</div>
        <button class="btn-calc" onclick="calcReverse()">執行回推</button>
        <div class="res-display" id="rev_res" style="display:none; background:#ecfdf5; border-color:#a7f3d0;">
            <div class="res-row"><span class="res-label" style="color:#065f46;">計算厚度 (T)</span><span id="res_t" class="res-num" style="color:#059669;">---</span></div>
        </div>
    </div>

    <div class="card">
        <h2>🌀 捲繞外徑計算</h2>
        <div class="mode-box">
            <div id="ob1" class="mode-btn active" onclick="setOMode(7060, 17.6, 'ob1')">7060</div>
            <div id="ob2" class="mode-btn" onclick="setOMode(2060, 9.6, 'ob2')">2060</div>
        </div>
        <div class="grid">
            <div class="input-group"><label>輸入米數 (L)</label><input type="number" id="ol" placeholder="0"></div>
            <div class="input-group"><label>輸入厚度 (T)</label><input type="number" id="ot" placeholder="0"></div>
        </div>
        <button class="btn-calc" style="background:#6366f1;" onclick="calcOD()">執行計算</button>
        <div class="res-display" id="od_res" style="display:none;">
            <div class="res-row"><span class="res-label">預估總外徑 (OD)</span><span id="res_od_val" class="res-num">---</span></div>
            <div class="res-row"><span class="res-label">單邊半徑</span><span id="res_r_val" class="res-num">---</span></div>
        </div>
    </div>
</div>

<script>
    let curRC = 7060, curRM = 17.6;
    let curOC = 7060, curOM = 17.6;

    function setRMode(c, m, id) {
        curRC = c; curRM = m;
        document.querySelectorAll('[id^="rb"]').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setOMode(c, m, id) {
        curOC = c; curOM = m;
        document.querySelectorAll('[id^="ob"]').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function clearOthers(type) {
        if (type === 'od') document.getElementById('rev_side').value = "";
        if (type === 'side') document.getElementById('rev_od').value = "";
    }

    function calcReverse() {
        let od = parseFloat(document.getElementById('rev_od').value);
        const side = parseFloat(document.getElementById('rev_side').value);
        const l = parseFloat(document.getElementById('rev_l').value);
        
        // 如果輸入的是單邊半徑，換算成總外徑: (單邊半徑 * 2) + 管徑
        if (!od && side) od = (side * 2) + curRM;
        
        if (!od || !l) { alert("請輸入量測值與米數"); return; }
        
        const t = (Math.pow((od / 2.54 * 12.7), 2) - curRC) / (l * 318.31);
        document.getElementById('res_t').innerText = t.toFixed(5);
        document.getElementById('rev_res').style.display = 'block';
    }

    function calcOD() {
        const l = parseFloat(document.getElementById('ol').value);
        const t = parseFloat(document.getElementById('ot').value);
        if(!l || !t) { alert("請輸入米數與厚度"); return; }
        
        const od = (Math.sqrt((l * t * 318.31) + curOC) / 12.7) * 2.54;
        const r = (od - curOM) / 2;
        
        document.getElementById('res_od_val').innerText = od.toFixed(2);
        document.getElementById('res_r_val').innerText = r.toFixed(2);
        document.getElementById('od_res').style.display = 'block';
    }
</script>
</body>
</html>
